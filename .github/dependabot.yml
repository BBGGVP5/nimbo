version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/apps/ui"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/apps/installer"
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: "/apps/android"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
